# Low-latency configuration - 8-port switch
# Tuned for latency-sensitive workloads

num_ports: 8
addr_length: 4
hash_module_type: FullLookupTable
buffer_type: NBuffersPerPort
scheduler_type: iSLIP
clock_frequency_mhz: 300.0  # higher clock for lower per-cycle delay
axis_data_width: 512
global_voq_size: 128        # smaller buffer keeps queueing delay low